<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; font-size: 13px; color: #ccc; background: #2b2b2b; padding: 16px; }
    h3 { color: #fff; margin-bottom: 12px; font-size: 15px; }
    .status { margin-bottom: 12px; }
    .status.running { color: #4caf50; }
    .status.stopped { color: #f44336; }
    .btn-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .btn { padding: 6px 16px; border: 1px solid #555; background: #3a3a3a; color: #ddd; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .btn:hover { background: #4a4a4a; border-color: #888; }
    .info { margin-bottom: 8px; }
    .info strong { color: #aaa; }
    .info span { color: #fff; }
    .log { background: #1e1e1e; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 11px; max-height: 200px; overflow: auto; white-space: pre-wrap; color: #999; margin-top: 12px; }
  </style>
</head>
<body>
  <h3>Cocos Bridge MCP</h3>
  <div id="status" class="status stopped">&#9679; Loading...</div>
  <div class="btn-row">
    <button class="btn" id="btn-start">Start Server</button>
    <button class="btn" id="btn-stop">Stop Server</button>
    <button class="btn" id="btn-restart">Restart</button>
  </div>
  <div class="info"><strong>URL: </strong><span id="url">-</span></div>
  <div class="info"><strong>Tools: </strong><span id="tool-count">-</span></div>
  <div class="info"><strong>Profile: </strong><span id="profile">-</span></div>
  <div class="info"><strong>Version: </strong><span id="version">-</span></div>
  <div class="log" id="log">Waiting for server...</div>
  <script src="./panel-app.js"></script>
</body>
</html>
